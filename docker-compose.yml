name: isdataconsulting

x-dev-service: &dev-service
  image: isdataconsulting-dev:latest
  build:
    context: .
    target: dev-runtime
  pull_policy: missing
  volumes: ['.:/workspace']
  networks: [isdataconsulting-network]

services:
  format:
    <<: *dev-service
    container_name: isdataconsulting-format
    command: prettier --write "site/**/*.{html,css,js}" "*.{json,md,yml,yaml}"
    profiles: [tools]

  lint:
    <<: *dev-service
    container_name: isdataconsulting-lint
    command: prettier --check "site/**/*.{html,css,js}" "*.{json,md,yml,yaml}"
    profiles: [tools]

  serve:
    <<: *dev-service
    container_name: isdataconsulting-serve
    command: serve site -l 3000
    restart: unless-stopped
    ports: ['3000:3000']
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3000 >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  prod:
    image: isdataconsulting-prod:latest
    container_name: isdataconsulting-prod
    build:
      context: .
      target: prod
    pull_policy: missing
    profiles: [prod]
    restart: unless-stopped
    ports: ['8080:8080']
    networks: [isdataconsulting-network]
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8080 >/dev/null || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  isdataconsulting-network:
    name: isdataconsulting-network

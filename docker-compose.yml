x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
    target: dev
  image: isdataconsulting.com:dev
  volumes:
    - .:/app:cached
    - /app/node_modules
    - /app/.npm
    - /app/.cache
    - /app/.venv
    - /app/venv
    - /app/__pycache__

services:
  dev:
    <<: *app-base
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: npm run dev
    stdin_open: true
    tty: true

  test:
    <<: *app-base
    profiles:
      - tools
    environment:
      - NODE_ENV=test
    command: npm run test

  test-coverage:
    <<: *app-base
    profiles:
      - tools
    environment:
      - NODE_ENV=test
    command: npm run test:coverage

  lint:
    <<: *app-base
    profiles:
      - tools
    command: npm run lint

  lint-fix:
    <<: *app-base
    profiles:
      - tools
    command: npm run lint:fix

  type-check:
    <<: *app-base
    profiles:
      - tools
    command: npm run type-check

  build:
    <<: *app-base
    profiles:
      - tools
    command: npm run build

  shell:
    <<: *app-base
    profiles:
      - tools
    command: sh
    stdin_open: true
    tty: true

  prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    image: isdataconsulting.com:prod
    profiles:
      - production
    ports:
      - "8080:8080"
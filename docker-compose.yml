services:
  dev:
    container_name: dev
    profiles:
      - dev
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  test:
    profiles:
      - test
    build: .
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run test:coverage

  build:
    profiles:
      - build
    build: .
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run build

  prod:
    container_name: prod
    profiles:
      - prod
    build: .
    ports:
      - "4173:4173"
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 4173"

volumes:
  node_modules:

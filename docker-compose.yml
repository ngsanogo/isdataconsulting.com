services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: isdataconsulting.com:dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: isdataconsulting.com:dev
    profiles:
      - test
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
    command: npm run test:coverage
services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: isdataconsulting.com:dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  test:
    container_name: test
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: isdataconsulting.com:dev
    depends_on:
      - app
    profiles:
      - test
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
    command: npm test
name: Preprod Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: preprod-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-quality:
    name: Docker quality suite
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build dev-runtime image for this job
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: dev-runtime
          push: false
          load: true
          tags: isdata-consulting-web:dev-ci

      - name: Run strict quality gate in Docker
        run: docker run --rm isdata-consulting-web:dev-ci sh -lc "npm run check && npm run test:coverage"

  docker-prod-smoke:
    name: Docker production smoke test
    runs-on: ubuntu-latest
    needs: docker-quality
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build prod image for this job
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          push: false
          load: true
          tags: isdata-consulting-web:prod-ci

      - name: Build smoke-runner image for this job
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: dev-runtime
          push: false
          load: true
          tags: isdata-consulting-web:dev-ci

      - name: Start prod container
        run: docker run -d --name isdata-prod-ci -p 8080:8080 isdata-consulting-web:prod-ci

      - name: Validate prod endpoints and security headers in Docker
        run: >
          docker run --rm
          --network container:isdata-prod-ci
          isdata-consulting-web:dev-ci
          sh -lc "node /app/scripts/prod-smoke.mjs http://127.0.0.1:8080"

      - name: Tear down prod container
        if: always()
        run: docker rm -f isdata-prod-ci || true
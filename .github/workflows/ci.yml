name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Prettier check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Prettier
        run: npm install --global prettier@4.0.0-alpha.8

      - name: Check formatting
        run: prettier --check "site/**/*.{html,css,js}" "*.{json,md,yml,yaml}"

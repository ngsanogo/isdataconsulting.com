services:
  devcontainer:
    build:
      context: ..
      dockerfile: Dockerfile
      target: devcontainer
    init: true
    user: root
    working_dir: /workspace
    command: >
      sh -lc "
      mkdir -p /workspace/node_modules /workspace/.npm /workspace/.cache /workspace/.vite /workspace/dist /workspace/target &&
      chown -R node:node /workspace/node_modules /workspace/.npm /workspace/.cache /workspace/.vite /workspace/dist /workspace/target &&
      exec sleep infinity
      "
    environment:
      NODE_ENV: development
      PATH: /workspace/node_modules/.bin:/home/node/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      npm_config_cache: /workspace/.npm
      XDG_CACHE_HOME: /workspace/.cache
    volumes:
      - ..:/workspace:cached
      - /workspace/node_modules
      - /workspace/.npm
      - /workspace/.cache
      - /workspace/.vite
      - /workspace/dist
      - /workspace/target
